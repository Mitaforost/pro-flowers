<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-flowers</title>

    <link rel="preload" href="../font/Montserrat-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="../font/Montserrat-Medium.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="../font/Montserrat-Bold.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="../css/stylesheet.css">
    <link rel="stylesheet" href="../css/normalize.css">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
<header class="header">
    <div class="header__top">
        <div class="container header__top-inner">

            <a href="/" class="header__logo">
                <img src="/img/png/logo.png" alt="logo">
            </a>

            <div class="header__info">
                <span class="header__worktime">Работаем с 9 до 21</span>

                <a href="tel:+375291108050" class="header__phone">
                    <svg class="header__phone-icon">
                        <use xlink:href="./img/sprites.svg#icon-phone"></use>
                    </svg>
                    <span>+375 29 110-80-50</span>
                </a>

                <div class="header__lang">
                    <span>BYN</span>
                    <svg class="header__lang-arrow">
                        <use xlink:href="./img/sprites.svg#arrow"></use>
                    </svg>
                </div>

                <a href="#" class="header__account">
                    <svg class="header__account-icon">
                        <use xlink:href="./img/sprites.svg#icon-user"></use>
                    </svg>
                    Личный кабинет
                </a>

                <a href="#" class="header__cart">
                    <svg class="header__cart-icon">
                        <use xlink:href="./img/sprites.svg#icon-cart"></use>
                    </svg>
                    <span class="header__cart-count">0</span>
                </a>
            </div>

        </div>
    </div>

    <!-- фиксированная навигация -->
    <div class="header__nav">
        <div class="container">
            <nav class="nav">
                <ul class="nav__list">
                    <li class="nav__item"><a href="#">Каталог</a></li>
                    <li class="nav__item"><a href="#">Услуги</a></li>
                    <li class="nav__item"><a href="#">Доставка</a></li>
                    <li class="nav__item"><a href="#">Оплата</a></li>
                    <li class="nav__item"><a href="#">Блог</a></li>
                    <li class="nav__item"><a href="#">О компании</a></li>
                    <li class="nav__item"><a href="#">Контакты</a></li>
                </ul>
            </nav>
        </div>
    </div>
</header>
