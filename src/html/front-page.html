@@include('./common/header.html')
<section class="hero">
    <div class="swiper hero__slider" data-slider="hero">
        <div class="swiper-wrapper">
            <!-- Слайд -->
            <div class="swiper-slide hero__slide">
                <div class="hero__content">
                    <h2 class="hero__title">Свежие букеты с быстрой доставкой по Минску</h2>
                    <p class="hero__subtitle">Живые цветы - живые эмоции</p>
                    <button class="button button--banner">Выбрать букет</button>
                </div>
                <div class="hero__image">
                    <img src="./img/jpg/buket1.jpg" alt="">
                </div>
            </div>

            <!-- Слайд -->
            <div class="swiper-slide hero__slide hero__slide--dark">
                <div class="hero__content">
                    <h2 class="hero__title">Только лучшие букеты!</h2>
                    <p class="hero__subtitle">Круглосуточная доставка любви</p>
                    <button class="button button--banner">Выбрать букет</button>
                </div>
                <div class="hero__image">
                    <img src="./img/jpg/buket2.jpg" alt="">
                </div>
            </div>
        </div>

        <!-- Навигация -->
        <div class="hero__controls">
            <button class="hero__arrow hero__arrow--prev">❮</button>
            <button class="hero__arrow hero__arrow--next">❯</button>
        </div>
    </div>
</section>
@@include('./common/footer.html')
